on:
  pull_request:
  push:
    branches:
      - main
      - stage/**

jobs:
  compile-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio
      - uses: actions/setup-python@v6
        with:
          python-version: 3.14
      - run: pip install platformio==6.1.19
      - run: pio run -e uno
      - run: pio test -e native
